name: Test and deploy GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -r requirements.txt
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - name: Check Python syntax
        run: python -m compileall -q app config.py run.py scripts tests
      - name: Check JavaScript syntax
        run: find app/static/js -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run backend and static artifact tests
        run: npm test
      - name: Run GitHub Pages browser smoke test
        run: npm run test:e2e

  deploy:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_static.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
